version: 2

models:
  - name: stg_tickets
    description: >
      Staging model containing cleaned customer support ticket data.
      One row per support ticket.

    columns:

      - name: ticket_id
        description: "{{ doc('ticket_id') }}"
        data_tests:
          - not_null
          - unique

      - name: customer_name
        description: "{{ doc('customer_name') }}"

      - name: customer_email
        description: "{{ doc('customer_email') }}"

      - name: customer_age
        description: "{{ doc('customer_age') }}"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 18
                max_value: 100
                strictly: false

      - name: customer_gender
        description: "{{ doc('customer_gender') }}"

      - name: product_purchased
        description: "{{ doc('product_purchased') }}"

      - name: purchase_date
        description: "{{ doc('purchase_date') }}"

      - name: ticket_type
        description: "{{ doc('ticket_type') }}"

      - name: ticket_subject
        description: "{{ doc('ticket_subject') }}"

      - name: ticket_description
        description: "{{ doc('ticket_description') }}"

      - name: ticket_status
        description: "{{ doc('ticket_status') }}"

      - name: resolution
        description: "{{ doc('resolution') }}"

      - name: ticket_priority
        description: "{{ doc('ticket_priority') }}"

      - name: ticket_channel
        description: "{{ doc('ticket_channel') }}"

      - name: first_response_time_est
        description: "{{ doc('first_response_time_est') }}"

      - name: time_to_resolution_est
        description: "{{ doc('time_to_resolution_est') }}"

      - name: customer_satisfaction_rating
        description: "{{ doc('customer_satisfaction_rating') }}"